<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Quartz</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="cb-popup">
      <header class="cb-popup-header">
        <div class="cb-popup-user" id="cb-popup-user">
          <div class="cb-popup-avatar cb-popup-avatar-sm" id="cb-popup-user-avatar"></div>
          <div class="cb-popup-user-meta">
            <div class="cb-popup-user-name" id="cb-popup-user-name">Loading…</div>
          </div>
        </div>
      </header>

      <div class="cb-popup-brand">
        <span class="cb-popup-brand-title">Quartz</span>
        <a
          class="cb-popup-gh"
          href="https://github.com/qr3naud/scoping"
          target="_blank"
          rel="noopener noreferrer"
          title="View the repository on GitHub"
          aria-label="View on GitHub"
        >
          <svg viewBox="0 0 16 16" width="15" height="15" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
          </svg>
        </a>
        <span id="cb-popup-version" class="cb-popup-version cb-popup-version-loading"></span>
      </div>

      <div id="cb-popup-search" class="cb-popup-search" hidden>
        <input
          id="cb-popup-search-input"
          type="text"
          class="cb-popup-search-input"
          placeholder="Search workbooks or workspaces…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div id="cb-popup-update" class="cb-popup-update" hidden>
        <span id="cb-popup-update-text" class="cb-popup-update-text">Update available</span>
        <button id="cb-popup-update-btn" type="button" class="cb-popup-update-btn">Update now</button>
      </div>

      <div id="cb-popup-status" class="cb-popup-status">Loading…</div>

      <ul id="cb-popup-list" class="cb-popup-list" hidden></ul>
    </div>

    <!-- Shared Supabase client must load first; popup.js reads window.cbSupabase. -->
    <script src="src/supabase.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
